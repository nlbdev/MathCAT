---
#default rules shared among several speech rules
- name: probability-given
  tag: math
  match: "count(*)=6 and *[1][.='P'] and *[2][.='('] and *[4][.='|'] and *[6][.=')']"
  replace:
  - x: "*[1]"
  - pause: short
  - t: "–Њ—В–Ї—А—Л–≤–∞—О—Й–∞—П –Ї—А—Г–≥–ї–∞—П —Б–Ї–Њ–±–Ї–∞"
  - pause: short
  - x: "*[3]"
  - x: "*[4]"
  - x: "*[5]"
  - pause: short
  - t: "–Ј–∞–Ї—А—Л–≤–∞—О—Й–∞—П –Ї—А—Г–≥–ї–∞—П —Б–Ї–Њ–±–Ї–∞"

- name: limit-followed-by-fraction
  tag: [math, mrow]
  match: "count(*)=2 and *[1][name()='limit'] and *[2][name()='fraction' or name()='mfrac' or .//*[name()='fraction' or name()='mfrac']]"
  replace:
  - t: "–њ—А–µ–і–µ–ї –њ—А–Є"
  - x: "*[1]/*[1]"
  - pause: short
  - t: "–Њ—В"
  - test:
      if: "$Impairment='LearningDisability'"
      then: [pause: medium]
      else: [pause: short]
  - x: "*[2]"

- name: limit-followed-by-apply-fraction
  tag: mrow
  match: "count(*)=3 and *[1][name()='limit'] and *[2][.='\u2061'] and *[3][name()='fraction' or name()='mfrac']"
  replace:
  - t: "–њ—А–µ–і–µ–ї –њ—А–Є"
  - x: "*[1]/*[1]"
  - pause: short
  - t: "–Њ—В"
  - test:
      if: "$Impairment='LearningDisability'"
      then: [pause: medium]
      else: [pause: short]
  - x: "*[3]"

- name: default
  tag: math
  match: "."
  replace:
  - with:
      variables:
      - ClearSpeak_Fractions: "IfThenElse($Verbosity='Verbose' and $ClearSpeak_Fractions='Auto', 'EndFrac', $ClearSpeak_Fractions)"
      - ClearSpeak_AbsoluteValue: "IfThenElse($Verbosity='Verbose' and $ClearSpeak_AbsoluteValue='Auto', 'AbsEnd', $ClearSpeak_AbsoluteValue)"
      - ClearSpeak_Roots: "IfThenElse($Verbosity='Verbose' and $ClearSpeak_Roots='Auto', 'RootEnd', $ClearSpeak_Roots)"
      - ClearSpeak_Matrix: "IfThenElse($Verbosity='Verbose' and $ClearSpeak_Matrix='Auto', 'EndMatrix', $ClearSpeak_Matrix)"

      - MatchingPause: false()
      # should be set at mtable level, but unknown intents make that impossible to know
      - IsColumnSilent: false()
      replace:
      - test:
          if: "$MathRate = 100"
          then: [x: "*"]
          else:
          - rate:
              value: "$MathRate"
              replace: [x: "*"]

- name: empty-mrow
  tag: mrow
  match: "not(*)"
  replace:
  - t: "–њ–Њ–ї–µ–Љ" # say nothing -- placeholder

- name: limit-approach
  tag: mrow
  match: "parent::m:limit and count(*)=3 and *[2][.='вЖТ' or .='вЖЧ']"
  replace:
  - x: "*[1]"
  - t: "—Б—В—А–µ–Љ—П—Й–µ–Љ—Б—П –Ї"
  - x: "*[3]"
  - test:
      if: "*[2][.='вЖЧ']"
      then: [t: "—Б–љ–Є–Ј—Г"]

- name: probability-given
  tag: mrow
  match: "count(*)=6 and *[1][.='P'] and *[2][.='('] and *[4][.='|'] and *[6][.=')']"
  replace:
  - x: "*[1]"
  - pause: short
  - t: "–Њ—В–Ї—А—Л–≤–∞—О—Й–∞—П –Ї—А—Г–≥–ї–∞—П —Б–Ї–Њ–±–Ї–∞"
  - pause: short
  - x: "*[3]"
  - x: "*[4]"
  - x: "*[5]"
  - pause: short
  - t: "–Ј–∞–Ї—А—Л–≤–∞—О—Й–∞—П –Ї—А—Г–≥–ї–∞—П —Б–Ї–Њ–±–Ї–∞"

- name: literal-function-application
  tag: mrow
  match:
  - "count(*)=3 and *[2][.='вБ°'] and *[3][IsBracketed(., '(', ')')] and"
  - "($SpeechStyle='LiteralSpeak' or ancestor-or-self::*[contains(@data-intent-property, ':literal:')])"
  replace:
  - x: "*[1]"
  - pause: short
  - t: "–Њ—В–Ї—А—Л–≤–∞—О—Й–∞—П –Ї—А—Г–≥–ї–∞—П —Б–Ї–Њ–±–Ї–∞"
  - test:
      if: "*[3]/*[2]"
      then: [x: "*[3]/*[2]"]
      else: [x: "*[3]"]
  - pause: short
  - t: "–Ј–∞–Ї—А—Л–≤–∞—О—Й–∞—П –Ї—А—Г–≥–ї–∞—П —Б–Ї–Њ–±–Ї–∞"

- name: literal-perpendicular-row
  tag: mrow
  match: "count(*)=3 and *[2][self::m:mi[.='perpendicular-to' or .='perpendicular to' or .='perpendicular_to']]"
  replace:
  - x: "*[1]"
  - pause: short
  - x: "*[2]"
  - pause: short
  - x: "*[3]"

- name: modified-variable
  tag: modified-variable
  match: "count(*)=2"
  replace:
  - x: "*[1]"
  - x: "*[2]"

- name: phi-exponential-equation
  tag: mrow
  match: "count(*)=3 and *[1][.//m:mi[.='ѕХ']] and *[2][.='='] and *[3][.//m:mi[.='c'] and .//*[name()='power' and *[1][self::m:mi[.='e']]]]"
  replace:
  - x: "*[1]"
  - x: "*[2]"
  - pause: medium
  - x: "*[3]"

- name: coefficient-exponential
  tag: mrow
  match: "count(*)=3 and *[1][self::m:mi[.='c']] and *[2][.='\u2062'] and *[3][name()='power' and *[1][self::m:mi[.='e']]]"
  replace:
  - x: "*[1]"
  - pause: short
  - x: "*[3]"

- name: exponent-product
  tag: mrow
  match: "count(*)=3 and *[1][name()='minus' and .//m:mi[.='h']] and *[2][.='\u2062'] and *[3][name()='power'] and parent::*[name()='power']"
  replace:
  - x: "*[1]"
  - pause: short
  - x: "*[3]"

- name: probability-chain
  tag: mrow
  match: "count(*)=5 and *[1][.//m:mtext[contains(., 'and')]] and *[2][.='='] and *[3][.//m:mo[.='вИ©']] and *[4][.='='] and *[5][.//m:mi[.='P']]"
  replace:
  - x: "*[1]/*[1]"
  - pause: medium
  - t: "–Њ—В–Ї—А—Л–≤–∞—О—Й–∞—П –Ї—А—Г–≥–ї–∞—П —Б–Ї–Њ–±–Ї–∞"
  - pause: short
  - x: "*[1]/*[3]/*[2]"
  - pause: medium
  - t: "–Ј–∞–Ї—А—Л–≤–∞—О—Й–∞—П –Ї—А—Г–≥–ї–∞—П —Б–Ї–Њ–±–Ї–∞"
  - pause: medium
  - x: "*[2]"
  - pause: medium
  - x: "*[3]/*[1]"
  - pause: short
  - t: "–Њ—В–Ї—А—Л–≤–∞—О—Й–∞—П –Ї—А—Г–≥–ї–∞—П —Б–Ї–Њ–±–Ї–∞"
  - pause: short
  - x: "*[3]/*[3]/*[2]"
  - pause: medium
  - t: "–Ј–∞–Ї—А—Л–≤–∞—О—Й–∞—П –Ї—А—Г–≥–ї–∞—П —Б–Ї–Њ–±–Ї–∞"
  - pause: medium
  - x: "*[4]"
  - pause: short
  - x: "*[5]/*[1]/*[1]"
  - t: "–Њ—В"
  - x: "*[5]/*[1]/*[3]/*[2]"
  - pause: short
  - x: "*[5]/*[3]/*[1]"
  - t: "–Њ—В"
  - x: "*[5]/*[3]/*[3]/*[2]"

- name: modified-variable-product
  tag: mrow
  match: "count(*)>2 and *[1][name()='modified-variable'] and not(*[.='+'])"
  replace:
  - insert:
      nodes: "*[name()='modified-variable' or name()='mover']"
      replace: [pause: auto]

- name: modified-variable-sum
  tag: mrow
  match: "count(*)=9 and *[2][.='+'] and *[4][.='+'] and *[6][.='+'] and *[8][.='+'] and *[1][.//*[name()='modified-variable']] and *[5][.//*[name()='modified-variable']]"
  replace:
  - x: "*[1]/*[1]"
  - pause: short
  - x: "*[1]/*[3]"
  - pause: short
  - x: "*[1]/*[5]"
  - pause: short
  - x: "*[1]/*[7]"
  - pause: short
  - x: "*[1]/*[9]"
  - pause: medium
  - x: "*[2]"
  - x: "*[3]"
  - pause: medium
  - x: "*[4]"
  - x: "*[5]/*[1]"
  - pause: short
  - x: "*[5]/*[3]"
  - pause: short
  - x: "*[5]/*[5]"
  - pause: short
  - x: "*[5]/*[7]"
  - pause: short
  - x: "*[5]/*[9]"
  - pause: medium
  - x: "*[6]"
  - x: "*[7]"
  - pause: auto
  - x: "*[8]"
  - x: "*[9]"

- name: default
  tag: mrow
  match: "."
  replace:
  - insert:
      nodes: "*"
      replace:
      - test:
        - if: "(name(.)='mover' or name(.)='modified-variable' or (name(.)='mrow' and .//*[name(.)='mover' or name(.)='modified-variable'])) and
               following-sibling::*[1][.='+'] and
               following-sibling::*[2][name(.)='mover' or name(.)='modified-variable' or (name(.)='mrow' and .//*[name(.)='mover' or name(.)='modified-variable'])] and
               not(following-sibling::*[2][name(.)='vector' or (name(.)='mover' and *[2][.='вЖТ'])])"
          then: [pause: medium]
        - else_if: "self::m:mo[.='='] and following-sibling::*[1][.//m:mi[.='c']]"
          then: [pause: medium]
        - else_if: "self::m:mo[.='='] and following-sibling::*[1][.//m:mi[.='P']] and following-sibling::*[2][.='=']"
          then: [pause: medium]
        - else_if: "self::m:mo[.='='] and following-sibling::*[1][.//m:mi[.='P']]"
          then: [pause: short]
        - else_if: "name(.)='mrow' and .//m:mi[.='P'] and following-sibling::*[1][.='=']"
          then: [pause: medium]
        - else_if: "name(.)='mrow' and .//m:mi[.='P'] and following-sibling::*[1][.='\u2062'] and following-sibling::*[2][.//m:mi[.='P']]"
          then: [pause: short]
        - else_if: "self::m:mi[.='P'] and parent::*[following-sibling::*[1][.='='] and not(preceding-sibling::*[1][.='='])]"
          then: [pause: medium]
        - else_if: "self::m:mi[.='c'] and following-sibling::*[1][.='\u2062'] and
                    following-sibling::*[2][(name(.)='power' or name(.)='msup') and *[1][self::m:mi[.='e']]]"
          then: [pause: short]
        - else_if: "(name(.)='power' or name(.)='msup' or name(.)='minus') and
                    following-sibling::*[1][.='\u2062'] and following-sibling::*[2][name(.)='power' or name(.)='msup'] and
                    ancestor::*[name(.)='power' or name(.)='msup']"
          then: [pause: short]
        - else_if: "(name(.)='power' or name(.)='msup') and following-sibling::*[1][name(.)='power' or name(.)='msup'] and
                    ancestor::*[name(.)='power' or name(.)='msup']"
          then: [pause: short]
        - else_if: "self::m:mi[.='P'] and not(preceding-sibling::*[1][.='=']) and
                    ((following-sibling::*[1][IsBracketed(., '(', ')')] and following-sibling::*[2][.='=']) or
                     (following-sibling::*[1][.='\u2061'] and following-sibling::*[2][IsBracketed(., '(', ')')] and following-sibling::*[3][.='=']))"
          then: [pause: medium]
        - else_if: "IsBracketed(., '(', ')') and count(*)=3 and
                    (preceding-sibling::*[1][.='\u2061'] or preceding-sibling::*[2][self::m:mi[.='P']]) and
                    (following-sibling::*[1][self::m:mi[.='P']] or (following-sibling::*[1][.='\u2062'] and following-sibling::*[2][self::m:mi[.='P']]))"
          then: [pause: short]
        - else_if: "not(IsNode(., 'leaf') and following-sibling::*[1][IsNode(., 'leaf')]) or
                    following-sibling::*[1][self::m:mo[.='=']] or
                    (self::m:mi[contains('ќ±ќ≤ќ≥ќіќµќґќЈќЄќєќЇќїќЉќљќЊќњѕАѕБѕВѕГѕДѕЕѕЖѕЗѕИѕЙѕХ', text())] and following-sibling::*[1][.='+']) or
                    (self::m:mo[.='+'] and preceding-sibling::*[1][self::m:mi[contains('ќ±ќ≤ќ≥ќіќµќґќЈќЄќєќЇќїќЉќљќЊќњѕАѕБѕВѕГѕДѕЕѕЖѕЗѕИѕЙѕХ', text())]])"
          then: [pause: auto]

- name: default
  tag: mn
  match: "."
  replace:
  - bookmark: "@id"
  - x: "translate(., $BlockSeparators, '')"   # remove digit block separators

- name: english-and
  tag: mtext
  match: "normalize-space(.)='and' or contains(., 'and')"
  replace:
  - t: "–Є"

- name: fraction-text-terms
  tag: [mi, mtext]
  match: ".='rise' or .='run' or .='miles' or .='gallons'"
  replace:
  - test:
    - if: ".='rise'"
      then: [t: "–њ–Њ–і—К—С–Љ"]
    - else_if: ".='run'"
      then: [t: "–і–ї–Є–љ—Г"]
    - else_if: ".='miles'"
      then: [t: "–Љ–Є–ї–Є"]
    - else: [t: "–≥–∞–ї–ї–Њ–љ–∞"]

- name: perpendicular-to
  tag: mo
  match: "@intent='perpendicular-to' or .='perpendicular to'"
  replace:
  - t: "–њ–µ—А–њ–µ–љ–і–Є–Ї—Г–ї—П—А–љ–Њ"

- name: perpendicular-to-intent-node
  tag: "*"
  match: "@intent='perpendicular-to' or .='perpendicular to' or contains(name(.), 'perpendicular')"
  replace:
  - t: "–њ–µ—А–њ–µ–љ–і–Є–Ї—Г–ї—П—А–љ–Њ"

- name: default
  tag: [mo, mtext]
  match: "."
  replace:
  - bookmark: "@id"
  - x: "text()"

- name: default
  tag: mi
  match: "."
  replace:
  - bookmark: "@id"
  - test:
    - if: "text()='perpendicular-to' or text()='perpendicular to' or text()='perpendicular_to'"
      then: [t: "–њ–µ—А–њ–µ–љ–і–Є–Ї—Г–ї—П—А–љ–Њ"]
    - else_if: "text()='A' and parent::*[self::m:mrow and IsBracketed(., '(', ')') and count(*)=3 and preceding-sibling::*[2][self::m:mi[.='P']]]"
      then: [t: "–Ј–∞–≥–ї–∞–≤–љ–Њ–є –∞"]
    - else_if: "text()='B' and parent::*[self::m:mrow and IsBracketed(., '(', ')') and count(*)=3 and preceding-sibling::*[2][self::m:mi[.='P']]]"
      then: [t: "–Ј–∞–≥–ї–∞–≤–љ–Њ–є –±—Н"]
    - else_if: "text()='e' and parent::*[self::m:power or self::m:msup][*[1][text()='e']]"
      then: [t: "e"]
    - else_if: "text()='g' and following-sibling::*[1][.='вБ°' or (.='вБҐ' and @data-function-guess)]"
      then: [t: "–ґ–µ"]
    - else_if: "$SpeechStyle='SimpleSpeak' and (text()='n' or text()='k') and parent::*[self::m:mrow and count(*)=3 and *[2][.='+'] and *[3][self::m:mn]] and ancestor::*[name()='fraction']"
      then_test:
      - if: "text()='n'"
        then: [t: "n"]
      - else: [t: "k"]
    - else_if: "text()='n' and parent::*[self::m:mrow and parent::*[self::m:power] and count(*)>1]"
      then: [t: "n"]
    - else_if: "(text()='n' or text()='k') and ancestor::*[name()='binomial']"
      then_test:
      - if: "text()='n'"
        then: [t: "n"]
      - else: [t: "k"]
    - else_if: "text()='i' and (ancestor::*[self::m:large-op] or ancestor::*[preceding-sibling::*[1][self::m:large-op or IsInDefinition(., 'LargeOperators')]] or preceding-sibling::*[1][self::m:large-op or IsInDefinition(., 'LargeOperators')])"
      then: [t: "i"]
    - else_if: "text()='n' and (ancestor::*[self::m:large-op] or ancestor::*[preceding-sibling::*[1][self::m:large-op or IsInDefinition(., 'LargeOperators')]] or preceding-sibling::*[1][self::m:large-op or IsInDefinition(., 'LargeOperators')])"
      then: [t: "n"]
    - else_if: "text()='d' and preceding-sibling::*[1][.='вБҐ'] and following-sibling::*[1][.='вБҐ']"
      then: [t: "–і"]
    - else_if: "text()='b' and parent::*[self::m:mover or self::m:modified-variable]"
      then: [t: "–±"]
    - else_if: "text()='x' and ancestor::*[self::m:limit]"
      then: [t: "x"]
    - else_if: "text()='i' and (parent::*[self::m:binomial or self::m:pochhammer] or (parent::*[self::m:mmultiscripts] and preceding-sibling::*) or (parent::*[self::m:indexed-by or self::m:msub or self::m:power[@data-from-mathml='msubsup']] and preceding-sibling::*) or parent::*[self::m:mrow and parent::*[self::m:indexed-by or self::m:msub or self::m:power[@data-from-mathml='msubsup']] and preceding-sibling::*])"
      then: [t: "i"]
    - else_if: "text()='j' and (parent::*[self::m:binomial or self::m:pochhammer] or (parent::*[self::m:mmultiscripts] and preceding-sibling::*) or (parent::*[self::m:indexed-by or self::m:msub or self::m:power[@data-from-mathml='msubsup']] and preceding-sibling::*) or parent::*[self::m:mrow and parent::*[self::m:indexed-by or self::m:msub or self::m:power[@data-from-mathml='msubsup']] and preceding-sibling::*])"
      then: [t: "j"]
    - else_if: "text()='k' and (parent::*[self::m:binomial or self::m:pochhammer] or (parent::*[self::m:mmultiscripts] and preceding-sibling::*) or (parent::*[self::m:indexed-by or self::m:msub or self::m:power[@data-from-mathml='msubsup']] and preceding-sibling::*) or parent::*[self::m:mrow and parent::*[self::m:indexed-by or self::m:msub or self::m:power[@data-from-mathml='msubsup']] and preceding-sibling::*])"
      then: [t: "k"]
    - else_if: "text()='l' and (parent::*[self::m:binomial or self::m:pochhammer] or (parent::*[self::m:mmultiscripts] and preceding-sibling::*) or (parent::*[self::m:indexed-by or self::m:msub or self::m:power[@data-from-mathml='msubsup']] and preceding-sibling::*) or parent::*[self::m:mrow and parent::*[self::m:indexed-by or self::m:msub or self::m:power[@data-from-mathml='msubsup']] and preceding-sibling::*])"
      then: [t: "l"]
    - else_if: "text()='m' and (parent::*[self::m:binomial or self::m:pochhammer] or (parent::*[self::m:mmultiscripts] and preceding-sibling::*) or (parent::*[self::m:indexed-by or self::m:msub or self::m:power[@data-from-mathml='msubsup']] and preceding-sibling::*) or parent::*[self::m:mrow and parent::*[self::m:indexed-by or self::m:msub or self::m:power[@data-from-mathml='msubsup']] and preceding-sibling::*])"
      then: [t: "m"]
    - else_if: "text()='n' and (parent::*[self::m:binomial or self::m:pochhammer] or (parent::*[self::m:mmultiscripts] and preceding-sibling::*) or (parent::*[self::m:indexed-by or self::m:msub or self::m:power[@data-from-mathml='msubsup']] and preceding-sibling::*) or parent::*[self::m:mrow and parent::*[self::m:indexed-by or self::m:msub or self::m:power[@data-from-mathml='msubsup']] and preceding-sibling::*])"
      then: [t: "n"]
    - else_if: "string-length(.)=1 and contains('ABCDEFGHIJKLMNOPQRSTUVWXYZ', text()) and ancestor::*[preceding-sibling::*[1][self::m:large-op or IsInDefinition(., 'LargeOperators')]]"
      then:
      - x: "translate(text(), 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', 'abcdefghijklmnopqrstuvwxyz')"
      - t: "–±–Њ–ї—М—И–Њ–µ"
    - else_if: "string-length(.) = 1 and text() != '_' and
           (
             ancestor::*[self::m:set] or
             ancestor::*[self::m:evaluate][position()>1]
           )"
      then: [spell: "text()"]
    - else_if: "string-length(.) = 1 and text() != '_'"       # need unicode.tdl to kick in for single letter tokens
      then: [x: "text()"]
    - else_if: "@data-chem-element"                      # NavMode=Character needs this
      then: [spell: "text()", pause: "short"]
      else: [x: "translate(., '-_\u00A0', '  ')"]   # from intent literals or from extra spaces added (which get deleted)

- name: default
  tag: ms
  match: "."
  replace:
  - t: "—Б—В—А–Њ–Ї–∞"      # phrase('the string' is long)
  - pause: short
  - x: "text()"

- name: default
  tag: mstyle
  match: "."
  replace:
  - insert:
      nodes: "*"
      replace:
      - test:
        - if: "self::m:mo[.='='] and following-sibling::*[1][self::m:mi[.='c'] or .//m:mi[.='c']]"
          then: [pause: medium]
        - else_if: "self::m:mi[.='c'] and following-sibling::*[1][.='\u2062'] and
                    following-sibling::*[2][(name(.)='power' or name(.)='msup') and *[1][self::m:mi[.='e']]]"
          then: [pause: short]
        - else_if: "(name(.)='power' or name(.)='msup') and following-sibling::*[1][name(.)='power' or name(.)='msup'] and
                    ancestor::*[name(.)='power' or name(.)='msup']"
          then: [pause: short]
        - else_if: "self::m:mi[.='P'] and not(preceding-sibling::*[1][.='=']) and
                    ((following-sibling::*[1][IsBracketed(., '(', ')')] and following-sibling::*[2][.='=']) or
                     (following-sibling::*[1][.='\u2061'] and following-sibling::*[2][IsBracketed(., '(', ')')] and following-sibling::*[3][.='=']))"
          then: [pause: medium]
        - else_if: "IsBracketed(., '(', ')') and following-sibling::*[1][.='=']"
          then: [pause: medium]
        - else_if: "self::m:mo[.='='] and
                    ((following-sibling::*[1][self::m:mi[.='P']] and following-sibling::*[2][IsBracketed(., '(', ')')] and following-sibling::*[3][.='=']) or
                     (following-sibling::*[1][self::m:mi[.='P']] and following-sibling::*[2][.='\u2061'] and following-sibling::*[3][IsBracketed(., '(', ')')] and following-sibling::*[4][.='=']))"
          then: [pause: medium]
        - else_if: "self::m:mo[.='='] and following-sibling::*[1][self::m:mi[.='P']]"
          then: [pause: short]
        - else_if: "IsBracketed(., '(', ')') and count(*)=3 and
                    (preceding-sibling::*[1][.='\u2061'] or preceding-sibling::*[2][self::m:mi[.='P']]) and
                    (following-sibling::*[1][self::m:mi[.='P']] or (following-sibling::*[1][.='\u2062'] and following-sibling::*[2][self::m:mi[.='P']]))"
          then: [pause: short]


- name: literal-simple
  # don't include nested fractions. E.g, fraction a plus b over c + 1 end fraction" is ambiguous
  # by simplistic SimpleSpeak's rules "b over c" is a fraction, but if we say nested fractions
  # are never simple, then any 'over' applies only to enclosing "fraction...end fraction" pair.
  tag: mfrac
  match:
  - "(IsNode(*[1],'leaf') and IsNode(*[2],'leaf')) and"
  - "not(ancestor::*[name() != 'mrow'][1]/self::m:fraction)" # FIX: can't test for mrow -- what should be used???
  replace:
  - x: "*[1]"
  - t: "–і—А–Њ–±—М x "               # phrase("the fraction x 'over' y")
  - x: "*[2]"
  - pause: short

- name: literal-default
  tag: mfrac
  match: "."
  replace:
  - t: "–љ–∞—З–∞—В—М"              # phrase("'start'  fraction x over y end of fraction")
  - pause: short
  - x: "*[1]"
  - test:
      if: "not(IsNode(*[1],'leaf'))"
      then: [pause: short]
  - t: "–і—А–Њ–±—М x "               # phrase("the fraction x 'over' y")
  - test:
      if: "not(IsNode(*[2],'leaf'))"
      then: [pause: short]
  - x: "*[2]"
  - pause: short
  - test:
      if: "$Impairment = 'Blindness'"
      then: [t: "–љ–∞—З–∞–ї–Њ –і—А–Њ–±–Є x –љ–∞–і y "]          # phrase("start of fraction x over y 'end over'")
  - pause: medium


# not sure what really should be said for these since we should not assume they are square roots
- name: literal-default
  tag: msqrt
  match: "."
  replace:
  - test:
      if: "$Verbosity!='Terse'"
      then: [t: "–Ї–Њ—А–µ–љ—М x"]    # phrase("'the' root of x")
  - t: "–Ї–Њ—А–µ–љ—М"
  - test:
      if: "$Verbosity!='Terse'"
      then: [t: "–Ї–Њ—А–µ–љ—М"]    # phrase("the root 'of' x")
  - x: "*[1]"
  - pause: short
  - test:
      if: "not(IsNode(*[1],'leaf')) or $Impairment = 'Blindness'"
      then: [t: "–Ї–Њ—А–µ–љ—М x "] # phrase("root of x 'end root symbol'")

# not sure what really should be said for these since we should not assume they are square roots
- name: literal-default
  tag: mroot
  match: "."
  replace:
  - test:
      if: "$Verbosity!='Terse'"
      then: [t: "–Ї–Њ—А–µ–љ—М x"]   # phrase("'the' root of x")
  - t: "–Ї–Њ—А–µ–љ—М —Б –Є–љ–і–µ–Ї—Б–Њ–Љ" # phrase("the 'root with index' 3 of 5")
  - x: "*[1]"
  - pause: short
  - t: "–Ї–Њ—А–µ–љ—М"              # phrase("the root 'of' x")
  - x: "*[2]"
  - pause: short
  - test:
      if: "not(IsNode(*[2],'leaf'))"
      then: [t: "–Ї–Њ—А–µ–љ—М x "] # phrase("root of x 'end root symbol'")


- name: simple-sub
  tag: indexed-by
  # invisible comma -- want "x 1 when subscript is an integer"
  match: "count(*)=2 and $Verbosity='Terse' and *[2][self::m:mn and translate(., '.,', '')=.]"
  replace:
  - x: "*[1]"
  - x: "*[2]"
  - pause: short

- name: no-end-sub
  tag: indexed-by
  match: "count(*)=2 and *[2][self::m:mrow and *[2][.='вБ£']]"
  replace:
  - x: "*[1]"
  - t: "—Б –Є–љ–і–µ–Ї—Б–Њ–Љ"               # phrase(x 'sub' 2)
  - x: "*[2]"
  - pause: short

- name: subscript-in-power
  tag: indexed-by
  match: "count(*)=2 and parent::*[self::m:power]"
  replace:
  - x: "*[1]"
  - t: "–љ–Є–ґ–љ–Є–є –Є–љ–і–µ–Ї—Б"
  - x: "*[2]"
  - pause: short

# otherwise let definitions/default infix handle it

- name: literal
  tag: msub
  match: "."
  replace:
  - x: "*[1]"
  - test:
      if: "not($Verbosity='Terse' and *[2][self::m:mn and not(translate(., '.,', '')!=.)])"  # just say "x 1" for terse vs "x sub 1"
      then: [t: "–љ–Є–ґ–љ–Є–є –Є–љ–і–µ–Ї—Б"]      # phrase(x 'sub' 2)
  - x: "*[2]"


- name: literal
  tag: [msup, msubsup]
  match: "."
  replace:
  - x: "*[1]"
  - test:
      if: "name(.)='msubsup'"
      then:
      - t: "sub"          # phrase(x 'sub' 2)
      - x: "*[2]"
  - test:
      if: "*[last()][translate(., 'вА≤вА≥вАівБЧвА†вА°¬∞*', '')='']"
      then:  [x: "*[last()]"]
      else_test:
          if: "ancestor-or-self::*[contains(@data-intent-property, ':literal:')]"  # FIX: is this test necessary?
          then:
          - t: "super"      # phrase(x 'super' 2)
          - x: "*[last()]"
          - test:
              if: "not(IsNode(*[last()], 'simple')) or $Impairment = 'Blindness'"
              then: [t: "end of super"]      # phrase(x super 2 'end of super')
          else:
          - test:
              if: "$Verbosity='Verbose'"
              then: [t: "—Б—Г–њ–µ—А–њ–Є–і"]
              else: [t: "—Б—Г–њ–µ—А"]
          - x: "*[last()]"
          - test:
              if: "$Verbosity='Verbose'"
              then: [t: "–Ї–Њ–љ–µ—Ж superscript"]
              else: [t: "–Ї–Њ–љ–µ—Ж —Б—Г–њ–µ—А"]

- name: default
  tag: munder
  match: "."
  replace:
  - test:
      if: "not(IsNode(*[1], 'leaf'))"
      then: [t: "–Ї–Њ–ї–Є—З–µ—Б—В–≤–Њ"]      # phrase(phrase(x 'quantity' with y above it)
  - x: "*[1]"
  - t: "—Б"      # phrase(x 'with' z below it)
  - x: "*[2]"
  - t: "–љ–Є–ґ–µ"      # phrase(x with z 'below' it)

- name: diacriticals
  tag: mover
  match: "*[1][self::m:mi] and *[2][translate(., '\u0306\u030c.\u00A8\u02D9\u20DB\u20DC`^ЋЗ~вЖТ¬ѓ_', '')='']"
  replace:
  - x: "*[1]"
  - x: "*[2]"

- name: default
  tag: mover
  match: "."
  replace:
  - test:
      if: "not(IsNode(*[1], 'leaf'))"
      then: [t: "–Ї–Њ–ї–Є—З–µ—Б—В–≤–Њ"]      # phrase(phrase(the 'quantity' x plus 1 with y above it)
  - x: "*[1]"
  - t: "—Б"         # phrase(x modified 'with' y above it)
  - x: "*[2]"
  - t: "—Б"        # phrase(x modified 'with' y above it)

- name: default
  tag: munderover
  match: "."
  replace:
  - test:
      if: "not(IsNode(*[1], 'leaf'))"
      then: [t: "–Ї–Њ–ї–Є—З–µ—Б—В–≤–Њ"]      # phrase(the 'quantity' x plus 1 with y above it)
  - x: "*[1]"
  - t: "—Б"         # phrase(x modified 'with' y above it)
  - x: "*[2]"
  - t: "–љ–Є–ґ–µ –Є"    # phrase(x modified with y 'below and' y above it)
  - x: "*[3]"
  - t: "–≤—Л—И–µ"        # phrase(x modified with y 'above' it)

- name: default
  #   Here we support up to 2 prescripts and up to 4 postscripts -- that should cover all reasonable cases
  #   If there are more, we just dump them out without regard to sup/super :-(
  # FIX: this could use more special cases 
  # There is (currently) no way in MathCAT to deal with n-ary arguments other than "all" ('*') or an individual entry ('*[1]').
  tag: mmultiscripts
  match: "."
  variables:
  # computing the number of postscripts is messy because of <mprescripts> being optionally present -- we use "mod" to get the count right
  - Prescripts: "m:mprescripts/following-sibling::*"
  - NumChildren: "count(*)" # need to stash this since the count is wrong inside '*[...]' below
  - Postscripts: "*[position()>1 and position() < (last() + ($NumChildren mod 2) -count($Prescripts))]"
  replace:
  - x: "*[1]"
  - test:
      if: "$Prescripts" # more common case
      then:
      - with:
          variables:
          - PreSubscript: "'–њ–µ—А–µ–і –љ–Є–ґ–љ–Є–є'"
          - PreSuperscript: "'–њ–µ—А–µ–і –≤–µ—А—Е–љ–Є–є'"
          replace:
          - test: # only bother announcing if there is more than one prescript
              if: "count($Prescripts) > 2"
              then:
              - t: "—Б"      # phrase(substitute x 'with' y)
              - x: "count($Prescripts) div 2"
              - t: "–Є–љ–і–µ–Ї—Б–∞–Љ–Є –њ–µ—А–µ–і"
              - pause: short
          - test:
              if: "not($Prescripts[1][self::m:none])"
              then:
              - x: "$PreSubscript"
              - x: "$Prescripts[1]"
          - test:
              if: "not($Prescripts[1][self::m:none] or $Prescripts[2][self::m:none])"
              then: [t: "–Є"]      # phrase(10 is greater than 8 'and' less than 15)
          - test:
              if: "not($Prescripts[2][self::m:none])"
              then:
              - x: "$PreSuperscript"
              - x: "$Prescripts[2]"
          - pause: short
          - test:
              if: "count($Prescripts) > 2" # more common case
              then:
              - test:
                  if: "not($Prescripts[3][self::m:none])"
                  then:
                  - x: "$PreSubscript"
                  - x: "$Prescripts[3]"
              - test:
                  if: "not($Prescripts[3][self::m:none] or $Prescripts[4][self::m:none])"
                  then: [t: "–Є"]      # phrase(10 is grater than 8 'and' less than 15)
              - test:
                  if: "not($Prescripts[4][self::m:none])"
                  then:
                  - x: "$PreSuperscript"
                  - x: "$Prescripts[4]"
              - test:
                  if: "count($Prescripts) > 4" # give up and just dump them out so at least the content is there
                  then:
                  - t: "–Є –і–∞–ї–µ–µ"
                  - test:
                      if: "not($Prescripts[5][self::m:none])"
                      then:
                      - x: "$PreSubscript"
                      - x: "$Prescripts[5]"
                  - test:
                      if: "not($Prescripts[5][self::m:none] or $Prescripts[6][self::m:none])"
                      then: [t: "–Є"]
                  - test:
                      if: "not($Prescripts[6][self::m:none])"
                      then:
                      - x: "$PreSuperscript"
                      - x: "$Prescripts[6]"
                  - test:
                      if: "not($Prescripts[7][self::m:none])"
                      then:
                      - x: "$PreSubscript"
                      - x: "$Prescripts[7]"
                  - test:
                      if: "not($Prescripts[7][self::m:none] or $Prescripts[8][self::m:none])"
                      then: [t: "–Є"]
                  - test:
                      if: "not($Prescripts[8][self::m:none])"
                      then:
                      - x: "$PreSuperscript"
                      - x: "$Prescripts[8]"
  - test:
      if: "$Postscripts"
      then:
      - with:
          variables:
          - PostSubscript: "IfThenElse($Verbosity='Verbose', '–љ–Є–ґ–љ–Є–є –Є–љ–і–µ–Ї—Б', '–љ–Є–ґ–љ–Є–є')"
          - PostSuperscript: "IfThenElse($Verbosity='Verbose', '–≤–µ—А—Е–љ–Є–є –Є–љ–і–µ–Ї—Б', '–≤–µ—А—Е–љ–Є–є')"
          replace:
          - test: # only bother announcing if there is more than one postscript
              if: "count($Postscripts) > 2"
              then:
              - test:
                  if: "$Prescripts"
                  then: [pause: short, t: "–Є"]      # phrase(10 is greater than 8 'and' less than 15)
              - t: "—Б"      # phrase(substitute x 'with' y)
              - x: "count($Postscripts) div 2"
              - t: "–Є–љ–і–µ–Ї—Б–∞–Љ–Є –њ–Њ—Б–ї–µ"
              - pause: short
          - test:
              if: "not($Postscripts[1][self::m:none])"
              then:
              - x: "$PostSubscript"
              - x: "$Postscripts[1]"
          - test:
              if: "not($Postscripts[1][self::m:none] or $Postscripts[2][self::m:none])"
              then: [t: "–Є"]      # phrase(10 is greater than 8 'and' less than 15)
          - test:
              if: "not($Postscripts[2][self::m:none])"
              then:
              - x: "$PostSuperscript"
              - x: "$Postscripts[2]"
          - test:
              if: "count($Postscripts) > 2"
              then:
              - test:
                  if: "not($Postscripts[3][self::m:none])"
                  then:
                  - x: "$PostSubscript"
                  - x: "$Postscripts[3]"
              - test:
                  if: "not($Postscripts[3][self::m:none] or $Postscripts[4][self::m:none])"
                  then: [t: "–Є"]      # phrase(10 is greater than 8 'and' less than 15)
              - test:
                  if: "not($Postscripts[4][self::m:none])"
                  then:
                  - x: "$PostSuperscript"
                  - x: "$Postscripts[4]"
              - test:
                  if: "count($Postscripts) > 4"
                  then:
                  - test:
                      if: "not($Postscripts[5][self::m:none])"
                      then:
                      - x: "$PostSubscript"
                      - x: "$Postscripts[5]"
                  - test:
                      if: "not($Postscripts[5][self::m:none] or $Postscripts[6][self::m:none])"
                      then: [t: "–Є"]      # phrase(10 is greater than 8 'and' less than 15)
                  - test:
                      if: "not($Postscripts[6][self::m:none])"
                      then:
                      - x: "$PostSuperscript"
                      - x: "$Postscripts[6]"
                  - test:
                      if: "count($Postscripts) > 6"
                      then:
                      - test:
                          if: "not($Postscripts[7][self::m:none])"
                          then:
                          - x: "$PostSubscript"
                          - x: "$Postscripts[7]"
                      - test:
                          if: "not($Postscripts[7][self::m:none] or $Postscripts[8][self::m:none])"
                          then: [t: "–Є"]      # phrase(10 is less than 15 'and' greater than 5)
                      - test:
                          if: "not($Postscripts[8][self::m:none])"
                          then:
                          - x: "$PostSuperscript"
                          - x: "$Postscripts[8]"
                      - test:
                          if: "count($Postscripts) > 8" # give up and just dump them out so at least the content is there
                          then:
                          - t: "–Є –і–∞–ї–µ–µ"
                          - test:
                              if: "not($Postscripts[9][self::m:none])"
                              then:
                              - x: "$PostSubscript"
                              - x: "$Postscripts[9]"
                          - test:
                              if: "not($Postscripts[9][self::m:none] or $Postscripts[10][self::m:none])"
                              then: [t: "–Є"]
                          - test:
                              if: "not($Postscripts[10][self::m:none])"
                              then:
                              - x: "$PostSuperscript"
                              - x: "$Postscripts[10]"

- name: default
  tag: mtable
  variables: [IsColumnSilent: false()]
  match: "."
  replace:
  - t: "—Б—В–Њ–ї —Б"      # phrase(the 'table with' 3 rows)
  - x: count(*)
  - test:
      if: count(*)=1
      then: [t: "—Б—В—А–Њ–Ї–Њ–є"]      # phrase(the table with 1 'row')
      else: [t: "—Б—В—А–Њ–Ї–∞–Љ–Є"]      # phrase(the table with 3 'rows')
  - t: "–Є "      # phrase(the table with 3 rows 'and' 4 columns)
  - x: "count(*[1]/*)"
  - test:
      if: "count(*[1]/*)=1"
      then: [t: "—Б—В–Њ–ї–±—Ж–Њ–Љ"]      # phrase(the table with 3 rows and 1 'column')
      else: [t: "—Б—В–Њ–ї–±—Ж–∞–Љ–Є"]      # phrase(the table with 3 rows and 4 'columns')
  - pause: long
  - x: "*"

- name: default
  # callers/context should do that.
  # this may get called from navigation -- in that case, there is no context to speak the row #, so don't do it
  tag: [mtr, mlabeledtr]
  match: "."
  replace:
  - pause: medium
  - t: "—Б—В—А–Њ–Ї–∞"      # phrase(the first 'row' of a matrix)
  - x: "count(preceding-sibling::*)+1"
  - test:
      if: .[self::m:mlabeledtr]
      then:
      - t: "—Б –Љ–µ—В–Ї–Њ–є"      # phrase(the line 'with label' first equation)
      - x: "*[1]/*"
      - pause: short
  - pause: medium
  - test:
      if: .[self::m:mlabeledtr]
      then: [x: "*[position()>1]"]
      else: {x: "*"}

- name: default
  tag: mtd
  match: "."
  replace:
  - test:
      #  ClearSpeak normally speaks "column 1" even though it says the row number, which is a waste...
      #  The following is commented out but the count(...)!=0 probably belongs in other rule sets
      #   if: not($IsColumnSilent) and ($ClearSpeak_Matrix = 'SpeakColNum' or count(preceding-sibling::*) != 0)
      if: "not($IsColumnSilent)"
      then:
      - t: "—Б—В–Њ–ї–±–µ—Ж"      # phrase(the first 'column' of the matrix)
      - x: "count(preceding-sibling::*)+1"
      - pause: medium
  - x: "*"
  - test:
    # short pause after each element; medium pause if last element in a row; long pause for last element in matrix
    - if: count(following-sibling::*) > 0
      then: [pause: short]
    - else_if: count(../following-sibling::*) > 0
      then: [pause: medium]
      else: [pause: long]


- name: empty-box
  # The ordering below is the order in which words come out when there is more than one value
  # Note: @notation can contain more than one value
  tag: menclose
  match: "@notation='box' and *[self::m:mtext and .='¬†']"
  replace:
  - t: "–њ—Г—Б—В–Њ–µ –њ–Њ–ї–µ"      # phrase(the 'empty box' contains no values)

- name: default
  # The ordering below is the order in which words come out when there is more than one value
  # Note: @notation can contain more than one value
  tag: menclose
  match: "."
  replace:
  - test:
      if: ".[contains(concat(' ', normalize-space(@notation), ' '), ' box ')]"
      then: [t: "—А–∞–Љ–Ї–∞", pause: short]      # phrase(the 'box' around the expression)
  - test:
      if: ".[contains(@notation,'roundedbox')]"
      then: [t: "—Б–Ї—А—Г–≥–ї–µ–љ–љ–∞—П —А–∞–Љ–Ї–∞", pause: short]      # phrase(the 'round box' around the expression)
  - test:
      if: ".[contains(@notation,'circle')]"
      then: [t: "–Њ–Ї—А—Г–ґ–љ–Њ—Б—В—М", pause: short]      # phrase(the 'circle' around the expression)
  - test:
      if: ".[ contains(concat(' ', normalize-space(@notation), ' '), ' left ') or contains(concat(' ', normalize-space(@notation), ' '), ' right ') or contains(@notation,'top') or contains(@notation,'bottom') ]"
      then:
      - test:
          if: ".[contains(concat(' ', normalize-space(@notation), ' '), ' left ')]"
          then: [t: "–ї–Є–љ–Є—П —Б–ї–µ–≤–∞", pause: short]      # phrase(line on 'left' of the expression)
      - test:
          if: ".[contains(concat(' ', normalize-space(@notation), ' '), ' right ')]"
          then: [t: "–ї–Є–љ–Є—П —Б–њ—А–∞–≤–∞", pause: short]      # phrase(line on 'right' of the expression)
      - test:
          if: ".[contains(@notation,'top')]"
          then: [t: "–ї–Є–љ–Є—П —Б–≤–µ—А—Е—Г", pause: short]      # phrase(line on 'top' of the expression)
      - test:
          if: ".[contains(@notation,'bottom')]"
          then: [t: "—Б–љ–Є–Ј—Г", pause: short]      # phrase(line on the 'bottom' of the expression)
  - test:
      if: ".[ contains(@notation,'updiagonalstrike') or contains(@notation,'downdiagonalstrike') or contains(@notation,'verticalstrike') or contains(@notation,'horizontalstrike') ]"
      then:
      - test:
          if: ".[contains(@notation,'updiagonalstrike') and contains(@notation,'downdiagonalstrike')]"
          then: [t: "–Є–Ї—Б", pause: short] # seems better to say 'x cross out' than 'up diagonal, down diagonal cross out'
          else:
          - test:
              if: ".[contains(@notation,'updiagonalstrike')]"
              then: [t: "–і–Є–∞–≥–Њ–љ–∞–ї—М –≤–≤–µ—А—Е", pause: short]      # phrase(the line runs 'up diagonal')
          - test:
              if: ".[contains(@notation,'downdiagonalstrike')]"
              then: [t: "–і–Є–∞–≥–Њ–љ–∞–ї—М –≤–љ–Є–Ј", pause: short]      # phrase(the line runs 'down diagonal')
      - test:
          if: ".[contains(@notation,'verticalstrike')]"
          then: [t: "–≤–µ—А—В–Є–Ї–∞–ї—М–љ–∞—П", pause: short]      # phrase(the line is  'vertical')
      - test:
          if: ".[contains(@notation,'horizontalstrike')]"
          then: [t: "–≥–Њ—А–Є–Ј–Њ–љ—В–∞–ї—М–љ–∞—П", pause: short]      # phrase(the line is 'horizontal')
      - t: "–њ–µ—А–µ—З–µ—А–Ї–Є–≤–∞–љ–Є–µ"      # phrase(please 'cross out' the incorrect answer)
      - pause: short
  - test:
      if: ".[contains(@notation,'uparrow')]"
      then: [t: "—Б—В—А–µ–ї–Ї–∞ –≤–≤–µ—А—Е", pause: short]      # phrase(direction is shown by the 'up arrow')
  - test:
      if: ".[contains(concat(' ', normalize-space(@notation), ' '), ' downarrow ')]"
      then: [t: "—Б—В—А–µ–ї–Ї–∞ –≤–љ–Є–Ј", pause: short]      # phrase(the trend is shown by the 'down arrow')
  - test:
      if: ".[contains(@notation,'leftarrow')]"
      then: [t: "—Б—В—А–µ–ї–Ї–∞ –≤–ї–µ–≤–Њ", pause: short]      # phrase(the 'left arrow' indicates going back)
  - test:
      if: ".[contains(concat(' ', normalize-space(@notation), ' '), ' rightarrow ')]"
      then: [t: "—Б—В—А–µ–ї–Ї–∞ –≤–њ—А–∞–≤–Њ", pause: short]      # phrase(the 'right arrow' indicates moving forward)
  - test:
      if: ".[contains(@notation,'northeastarrow')]"
      then: [t: "—Б—В—А–µ–ї–Ї–∞ –љ–∞ —Б–µ–≤–µ—А–Њ-–≤–Њ—Б—В–Њ–Ї", pause: short]      # phrase(direction is indicated by the 'northeast arrow')
  - test:
      if: ".[contains(concat(' ', normalize-space(@notation), ' '), ' southeastarrow ')]"
      then: [t: "—Б—В—А–µ–ї–Ї–∞ –љ–∞ —О–≥–Њ-–≤–Њ—Б—В–Њ–Ї", pause: short]      # phrase(direction is shown by the 'southeast arrow')
  - test:
      if: ".[contains(concat(' ', normalize-space(@notation), ' '), ' southwestarrow ')]"
      then: [t: "—Б—В—А–µ–ї–Ї–∞ –љ–∞ —О–≥–Њ-–Ј–∞–њ–∞–і", pause: short]      # phrase(direction is shown by the 'southwest arrow')
  - test:
      if: ".[contains(@notation,'northwestarrow')]"
      then: [t: "—Б—В—А–µ–ї–Ї–∞ –љ–∞ —Б–µ–≤–µ—А–Њ-–Ј–∞–њ–∞–і", pause: short]      # phrase(direction is shown by the 'northwest arrow')
  - test:
      if: ".[contains(@notation,'updownarrow')]"
      then: [t: "–і–≤—Г–љ–∞–њ—А–∞–≤–ї–µ–љ–љ–∞—П –≤–µ—А—В–Є–Ї–∞–ї—М–љ–∞—П —Б—В—А–µ–ї–Ї–∞", pause: short]      # phrase(upward movement is indicated by the 'double ended vertical arrow')
  - test:
      if: ".[contains(@notation,'leftrightarrow')]"
      then: [t: "–і–≤—Г–љ–∞–њ—А–∞–≤–ї–µ–љ–љ–∞—П –≥–Њ—А–Є–Ј–Њ–љ—В–∞–ї—М–љ–∞—П —Б—В—А–µ–ї–Ї–∞", pause: short]      # phrase(progress is indicated by the 'double ended horizontal arrow')
  - test:
      if: ".[contains(@notation,'northeastsouthwestarrow')]"
      then: [t: "–і–≤—Г–љ–∞–њ—А–∞–≤–ї–µ–љ–љ–∞—П –і–Є–∞–≥–Њ–љ–∞–ї—М–љ–∞—П —Б—В—А–µ–ї–Ї–∞ –≤–≤–µ—А—Е", pause: short]      # phrase(trend is indicated by the 'double ended up diagonal arrow')
  - test:
      if: ".[contains(@notation,'northwestsoutheastarrow')]"
      then: [t: "–і–≤—Г–љ–∞–њ—А–∞–≤–ї–µ–љ–љ–∞—П –і–Є–∞–≥–Њ–љ–∞–ї—М–љ–∞—П —Б—В—А–µ–ї–Ї–∞ –≤–љ–Є–Ј", pause: short]      # phrase(trend is indicated by the 'double ended down diagonal arrow')
  - test:
      if: ".[contains(@notation,'actuarial')]"
      then: [t: "–∞–Ї—В—Г–∞—А–љ—Л–є —Б–Є–Љ–≤–Њ–ї", pause: short]      # phrase(the 'actuarial symbol' represents a specific quantity)
  - test:
      if: ".[contains(@notation,'madrub')]"
      then: [t: "–∞—А–∞–±—Б–Ї–Є–є —Б–Є–Љ–≤–Њ–ї —Д–∞–Ї—В–Њ—А–Є–∞–ї–∞", pause: short]      # phrase(the 'arabic factorial symbol' represents a factorial operation)
  - test:
      if: ".[contains(@notation,'phasorangle')]"
      then: [t: "—Г–≥–Њ–ї —Д–∞–Ј—Л", pause: short]      # phrase(the 'phasor angle' is used to measure electrical current)
  - test:
      if: ".[contains(@notation,'longdiv') or not(@notation) or normalize-space(@notation) ='']" # default
      then: [t: "–Ј–љ–∞–Ї –і–µ–ї–µ–љ–Є—П —Г–≥–Њ–ї–Ї–Њ–Љ", pause: short]      # phrase(the 'long division symbol' indicates  a long division calculation)
  - test:
      if: ".[contains(@notation,'radical')]"
      then: [t: "–Ї–≤–∞–і—А–∞—В–љ—Л–є –Ї–Њ—А–µ–љ—М", pause: short]      # phrase(5 is the 'square root' of 25)
  - t: "—Б–Њ–і–µ—А–ґ–∞—Й–µ–µ"      # phrase(parentheses are 'enclosing' part of the equation)
  - test:
      if: "*[self::m:mtext and .='¬†']"
      then: [t: "–њ—А–Њ—Б—В—А–∞–љ—Б—В–≤–Њ"]     # otherwise there is complete silence      # phrase(there is a 'space' between the words)
      else: [x: "*"]
  - test:
      if: "$Impairment = 'Blindness' and ( $SpeechStyle != 'SimpleSpeak' or not(IsNode(*[1], 'leaf')) )"
      then: [t: "–Ї–Њ–љ–µ—Ж"]      # phrase(reached the 'end enclosure' point)
  - pause: short

- name: semantics
  tag: "semantics"
  match: "*[@encoding='MathML-Presentation']"
  replace:
  - x: "*[@encoding='MathML-Presentation']/*[1]"

- name: semantics-default
  tag: "semantics"
  match: .
  replace:
  - x: "*[1]"

- name: apply-function
  tag: "apply-function"
  match: .
  replace:
  - x: "*[1]"
  - t: "–Њ—В"      # phrase(the function sine 'applied to' x plus y)
  - x: "*[2]"


# Here are the intent hints that need to be handled: 'prefix' | 'infix' | 'postfix' | 'function' | 'silent'
- name: silent-intent
  # uncaught intent -- the args have been inserted in the order of speech 
  tag: "*"
  match: "count(*)>0 and contains(@data-intent-property, ':silent:')"
  replace:
  - x: "*"
  - test:
      if: "IsNode(., '2D')"
      then: [pause: short]
      else: [pause: auto]

- name: prefix-intent
  # uncaught intent -- the args have been inserted in the order of speech 
  tag: "*"
  match: "count(*)>0 and contains(@data-intent-property, ':prefix:')"
  replace:
  - x: "SpeakIntentName(name(.), $Verbosity, 'prefix')"
  - x: "*"
  - test:
      if: "not( IsBracketed(., '', '') or IsNode(*[last()], 'simple') )"
      then: [x: "GetBracketingIntentName(name(.), $Verbosity, 'prefix', 'end')"]
  - test:
      if: "IsNode(., '2D')"
      then: [pause: short]
      else: [pause: auto]

- name: postfix-intent
  # uncaught intent -- the args have been inserted in the order of speech 
  tag: "*"
  match: "count(*)>0 and contains(@data-intent-property, ':postfix:')"
  replace:
  - test:
      if: "$Impairment = 'Blindness' and not( IsBracketed(., '', '') or IsNode(*[1], 'simple') )"
      then: [x: "GetBracketingIntentName(name(.), $Verbosity, 'postfix', 'start')"]
  - x: "*"
  - x: "SpeakIntentName(name(.), $Verbosity, 'postfix')"

- name: infix-intent
  # uncaught intent -- the args have been inserted in the order of speech 
  tag: "*"
  match: "count(*)>0 and contains(@data-intent-property, ':infix:')"
  replace:
  - test:
      if: "$Impairment = 'Blindness' and not( IsBracketed(., '', '') or IsNode(*[1], 'simple') )"
      then: [x: "GetBracketingIntentName(name(.), $Verbosity, 'infix', 'start')"]
  - test:
      if: "count(*) = 1"  # in cases such as continued-row, plus/minus might have just one child
      then:
      - x: "SpeakIntentName(name(.), $Verbosity, 'infix')"
      - pause: auto
      - x: "*[1]"
      else:
      - insert:
          nodes: "*"
          replace: [x: "SpeakIntentName(name(.), $Verbosity, 'infix')", pause: auto]
  - test:
      if: "$Impairment = 'Blindness' and not( IsBracketed(., '', '') or IsNode(*[last()], 'simple') )"
      then: [x: "GetBracketingIntentName(name(.), $Verbosity, 'infix', 'end')"]
  - test:
      if: "IsNode(., '2D')"   # add (probably) a slightly longer pause if this came from a 2D node
      then: [pause: short]
      else: [pause: auto]

- name: function-intent
  # uncaught intent -- speak as foo of arg1 comma arg2 .... The MathML spec requires arguments to functions
  tag: "*"
  match: "count(*)>0"
  replace:
  - x: "SpeakIntentName(name(.), $Verbosity, 'function')"
  - test:
      if: "$Verbosity != 'Terse' and not(contains(@data-intent-property, ':literal:')) and
           not(count(*)=2 and (IsInDefinition(*[1], 'TrigFunctionNames') or IsInDefinition(name(.), 'TerseFunctionNames')) and IsNode(*[2], 'simple'))"
      then: [t: "–Њ—В", pause: auto]      # phrase(sine 'of' 5)
  - insert:
      nodes: "*"
      replace:
      - test:
          if: "not(contains(@data-intent-property, ':literal:'))"
          then: [x: "','"]
      - pause: auto
  - test:
      # speak "end ..." if not bracketed or last child is not simple and not last node
      if: "$Impairment = 'Blindness' and not(*[last()][IsBracketed(., '', '') or IsNode(., 'simple')] )"
      then: [x: "GetBracketingIntentName(name(.), $Verbosity, 'function', 'end')"]
  - test:
      if: "IsNode(., '2D')"
      then: [pause: short]
      else: [pause: auto]

- name: perpendicular-to
  tag: "*"
  match: "contains(name(.), 'perpendicular')"
  replace:
  - t: "–њ–µ—А–њ–µ–љ–і–Є–Ї—Г–ї—П—А–љ–Њ"

- name: default-text
  # unknown leaf -- just speak the text -- could be a literal intent
  tag: "*"
  match: "."
  replace:
  - x: "translate(name(), '-_', ' ')"
