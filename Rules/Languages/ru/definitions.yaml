---
- include: "../../definitions.yaml"

# If an "intent" is used, the 'terse:medium:verbose' speech for the intent name is given here for a prefix||infix||postfix||function fixity
# If only one ":" is used, it the first part is used for 'terse' and the second part is used for 'medium' and 'verbose'
# If no ":"s are used, the same speech is used for all forms
# If bracketing words make sense, they are separated with ";"s
# Intent mappings must specify whether they are "prefix", "infix", "postfix", or "function" with an "=" sign
# If there are multiple fixities (e.g., see transpose), they are separated with "||
#   for readability, spaces can be used around any of the delimiter characters
# Note: if there are multiple fixities, the first one is used if the fixity is not given in the intent
- IntentMappings: {
    "indexed-by": "infix= ; индекс; конец индекса: конец индекса: конец индекса",
    "modified-variable": "silent= ",
    "say-super": "infix=верхний индекс: верхний индекс: верхний индекс",   # used with 'mo' for superscripts (e.g, "<")
    "skip-super": "silent=",   # used with 'mo' for superscripts (e.g, "*")

    "absolute-value": "function= ; модуль: модуль: модуль; конец модуля",
    "binomial": "infix=бином; по; конец бинома",
    # "closed-interval": "other=closed-interval; от,до; end closed-interval",
    "greatest-common-divisor": "function=нод: нод: наибольший общий делитель",
    "imaginary-part": "function=мнимая часть, мнимая часть, мнимая часть",
    "least-common-multiple": "function=нок:нок:наименьшее общее кратное",
    # "large-op": "infix=над || other=от,до",
    "limit": "prefix=придел при: придел при: придел при",
    "lim-sup": "prefix=верхний придел при: верхний придел при: верхний придел при",
    "lim-inf": "prefix=нижний придел при: нижний придел при: нижний придел при",
    "logarithm-with-base": "prefix=логарифм по основанию: логарифм по основанию: логарифм по основанию",
    "natural-logarithm": "function=l n: натуральный логарифм: натуральный логарифм",
    "minus": "infix=минус || prefix=отрицательное",
    "plus": "infix=плюс || prefix=положительное",
    # "pochhammer": "infix=permutations of",  # arguments are in reverse order, so can't work here
    "real-part": "function=действительная часть",

    "transpose": "postfix=транспонирование || function=транспонированная",
    "norm": "function=; норма: норма: норма; конец нормы",
    "trace": "function=;след : след: след; конец следа",
    "dimension": "function=; размерность : размерность: размерность; конец размерности",
    "homomorphism": "function= ; гомоморфизм : гомоморфизм: гомоморфизм; конец гомоморфизма",
    "kernel": "function= ; ядро : ядро: ядро; конец ядра",
    "vector": "function= ; вектор || prefix=вектор",
    "cross-product": "infix=векторное произведение: векторное произведение: векторное произведение",
    "dot-product": "infix=скалярное произведение: скалярное произведение: скалярное произведение",

    "divergence": "function= ; дивергенция: дивергенция: дивергенция; конец дивергенции",
    "curl": "function= ; ротор; конец ротора",
    "gradient": "function= ; градиент: градиент: градиент; конец градиента",
    "laplacian": "function=лапласиан",   # speech engines don't do a good job with "laplacian"

    "chemistry-concentration": "function= ; концентрация: концентрация: концентрация; конец концентрации",
  }
  # Names of functions that in terse mode don't say "of" (or it's equivalent in other languages)

- TerseFunctionNames: {
    "divergence", "gradient", "curl"
  }

- NavigationParts: {
    "large-op": "base; lower limit; upper limit",
    "mfrac": "numerator;denominator",
    "fraction": "numerator;denominator",
    "msqrt": "root",
    "square-root": "root",
    "mroot": "root;root index",
    "root": "root;root index",
    "msub": "base;subscript",
    "sub": "base;subscript",
    "msup": "base;superscript",
    "say-super": "base;superscript",
    "skip-super": "base;superscript",
    "power": "base;exponent",
    "msubsup": "base;subscript;superscript",
    "munder": "base;under limit",
    "mover": "base;upper limit",
    "munderover": "base;under limit;upper limit",

    # words for moving into and out of one of the parts (e.g., "move right 'out of' numerator, 'in' denominator")
    # it's a hack to put them here, but at least they are grouped with the other navigation parts
    "in": "in",
    "out": "out of",
  }

- OperatorIntentRenaming: {
    "dimension-product": "на"
  }

- KnownWords: {
    # MathCAT will put together some runs of three or more mi's (a common mistake), but skips those in alphabetical order.
    # This is a list of exceptions so that they do get put together. Don't list words with repeated letters.

    # I asked bard and chatgpt for formula words that are alphabetical, and they failed.
    # Here are the words I managed to find, but it almost certainly not complete. Change the list for other languages.
    "Abel", "aery", "ails", "airy", "amps", "cents", "flux", "flow", "knot",
  }

- SIPrefixes: {
"Q": "кветта", "R": "ронна", "Y": "иотта", "Z": "зетта", "E": "экса", "P": "пета", "T": "тера", "G": "гига", "M": "мега", "k": "кило", "h": "гекто", "da": "дека",
    "d": "деци", "c": "санти", "m": "милли", "µ": "микро", "n": "нано", "p": "пико", "f": "фемто", "a": "атто", "z": "зепто", "y": "иокто", "r": "ронто", "q": "квекто"
  }

# this is a list of all units that accept SIPrefixes
# from www.bipm.org/documents/20126/41483022/SI-Brochure-9-EN.pdf
#   Prefixes may be used with any of the 29 SI units with special names
#   The SI prefixes can be used with several of accepted units, but not, for example, with the non-SI units of time.
- SIUnits: {
    # base units
    "A": "ампер",
    "cd": "кандела",
    "K": "кельвин", "K": "кельвин", # U+212A
    "g": "грамм",
    "m": "метр",
    "mol": "моль",
    "s": "секунда", "sec": "секунда",  # "sec" не является официальным, но поддерживается

    # derived units
    "Bq": "беккерель",
    "C": "кулон",
    "°C": "градус Цельсия", "℃": "градус Цельсия", # должны использоваться только с отрицательными степенями
    "F": "фарад",
    "Gy": "грей",
    "H": "генри",
    "Hz": "герц",
    "J": "джоуль",
    "kat": "катал",
    "lm": "люмен",
    "lx": "люкс",
    "N": "ньютон",
    "Ω": "ом", "Ω": "ом",       # греческая заглавная буква Омега, U+2126 OHM SIGN
    "Pa": "паскаль",
    "S": "сименс",
    "Sv": "зиверт",
    "T": "тесла",
    "V": "вольт",
    "W": "ватт",
    "Wb": "вебер",

    # accepted (plus a few variants) that take SI prefixes
    "l": "литр", "L": "литр", "ℓ": "литр",  # должны использоваться только с отрицательными степенями
    "t": "тонна",           # должна использоваться только с положительными степенями
    "Da": "дальтон",
    "Np": "непер",               # должен использоваться только с отрицательными степенями
    "u": "атомная единица массы",     # 'u' правильно: https://en.wikipedia.org/wiki/Dalton_(unit)
    "eV": "электронвольт",
    "rad": "радиан",             # должен использоваться только с отрицательными степенями
    "sr": "стерадиан",          # должен использоваться только с отрицательными степенями      
  
    # others that take a prefix
    "a": "год",               # должен использоваться только с положительными степенями
    "as": "угловая секунда",          # см. ru.wikipedia.org/wiki/Minute_and_second_of_arc

    # technically wrong, but used in practice with SI Units
    "b": "бит",               # должен использоваться только с положительными степенями
    "B": "байт",              # должен использоваться только с положительными степенями
    "Bd": "бод",              # должен использоваться только с положительными степенями
  }


