    ]

- NumbersOrdinalPluralTens: [
"", "десятые", "двадцатые", "тридцатые", "сороковые", "пятидесятые", "шестидесятые", "семидесятые", "восьмидесятые", "девяностые"
    ]


- NumbersHundreds: [
"", "сто", "двести", "триста", "четыреста", "пятьсот",
