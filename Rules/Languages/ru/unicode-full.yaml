 - "｜":                                            # 0xff5c
     - with:
        variables: [DefaultToGiven: "count(preceding-sibling::*)=1 and count(following-sibling::*)=1 and ../../../*[1][.='P']"]
        replace:
        - test:
            - if: "$SpeechStyle != 'ClearSpeak'"
              then_test:
                  if: "$DefaultToGiven"
                  then: [t: "при условии"]
                  else: [t: "вертикальная черта"]
            - else_if: "not(preceding-sibling::*) or not(following-sibling::*)"
              then: [t: "вертикальная черта"]
            - else_if: "$ClearSpeak_VerticalLine = 'SuchThat'"
              then: [t: "такой, что"]
            - else_if: "$ClearSpeak_VerticalLine = 'Given' or $DefaultToGiven"
              then: [t: "при условии"] 
            - else: [t: "делит"]                   
