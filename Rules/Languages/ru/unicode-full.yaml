     - test:
        if: "ancestor::m:modified-variable and preceding-sibling::*[1][self::m:mi]"
        then: [t: "черта"]                        	# 	(en: 'bar', google translation)
        else: [t: "линия"]                      	# 	(en: 'line', google translation)
