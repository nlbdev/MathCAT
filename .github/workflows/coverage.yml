# Weekly LLVM source-based coverage for the whole workspace (`cargo llvm-cov`).
# Produces a terminal summary, an HTML artifact (90-day retention), and (on main)
# pushes HTML to the gh-pages branch under /llvm-cov/ for a stable browse URL
# when GitHub Pages is set to deploy from that branch.
name: Test coverage

on:
  schedule:
    # Monday 07:30 UTC — weekly; adjust if you want a different window.
    - cron: "30 7 * * 1"
  # Manual runs behave like schedule: HTML artifact + push to gh-pages on main (see gh-pages job `if`).
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.workflow }}
  cancel-in-progress: false

# Schedule / workflow_dispatch only (not PRs): allow pushing the gh-pages branch.
permissions:
  contents: write

jobs:
  llvm-cov:
    name: cargo llvm-cov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage (HTML + terminal summary)
        run: |
          cargo llvm-cov --workspace --html --output-dir llvm-cov-html --summary-only

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: llvm-cov-html
          path: llvm-cov-html/
          retention-days: 90
          if-no-files-found: error

      - name: Job summary (stable links)
        run: |
          {
            echo "### Test coverage (cargo-llvm-cov)"
            echo ""
            echo "**Stable links (same URL every week; pick the latest green run):**"
            echo "- [Scheduled workflow runs](${{ github.server_url }}/${{ github.repository }}/actions/workflows/coverage.yml?query=event%3Aschedule)"
            echo "- [All runs (incl. manual)](${{ github.server_url }}/${{ github.repository }}/actions/workflows/coverage.yml)"
            echo ""
            echo "**This run:** [artifacts and logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) — download **llvm-cov-html**, unzip, open \`index.html\`."
            echo ""
            echo "**Browsable site (optional):** if GitHub Pages uses the \`gh-pages\` branch, see the repo README for the \`/llvm-cov/\` URL."
          } >> "$GITHUB_STEP_SUMMARY"

  # Pushes only under llvm-cov/ and keeps other files on gh-pages (existing docs stay).
  gh-pages-llvm-cov:
    name: Publish HTML to gh-pages (llvm-cov/)
    needs: llvm-cov
    # Same as schedule: deploy on main for cron and for workflow_dispatch (manual runs).
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: llvm-cov-html
          path: llvm-cov-html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./llvm-cov-html
          destination_dir: llvm-cov
          keep_files: true
          user_name: github-actions
          user_email: github-actions@github.com
          commit_message: "chore: refresh llvm-cov HTML report"
